syntax = "proto3";

// The Deplo server-agent contract: the second system boundary, alongside
// GraphQL (UI <-> control plane). This is control plane <-> server. The agent
// is a single-purpose Go binary, one per server, that owns the host-coupled
// half of the platform (Docker, the build pipeline, host metrics) and exposes
// it over this typed RPC. See docs/research/server-agent/PLAN.md and
// docs/adr/0006-server-agent-is-a-per-host-go-binary.md.
//
// PART A SUBSET (extended in PART B + PART C). This file is the versioned
// boundary for the whole A-D arc. Part A implemented Hello / Metrics / Deploy
// (UPLOAD+IMAGE) / Inspect / control verbs (localhost agent, deploy-only). Part B
// adds: the GIT source case (the agent clones with a short-lived token, D3), and
// ReattachDeploy (reconnect to an in-flight deploy and replay missed events, D5).
// PART C adds the per-server OBSERVABILITY + FILES surface: FollowLogs (live
// `docker logs -f`), Attach (bidi console/pty), Exec + ListInstances + ShellLabel
// (the console introspection that was direct-Docker in lib/data/console.ts), and
// the file RPCs (List/Read/Write/Upload/CreateDir/Delete/Rename/FilesExist) that
// repoint lib/data/project-files.ts off the control plane's local fs onto the
// project's host. PART D adds the DEV-MODE + SSH-GATEWAY surface (the last
// per-host singletons, ADR-0002): StartDev/StopDev/ResetDevWorkspace/TeardownDev
// (the dev container lifecycle, repointing lib/deploy/dev.ts), EnsureGateway/
// ProvisionSshUser/DeprovisionSshUser (the SSH gateway, repointing
// lib/infra/ssh-gateway.ts — the control plane renders config + steps, the agent
// applies them), StartTunnel/GetTunnel/StopTunnel (the VS Code tunnel), and a new
// SOURCE_KIND_DEV_WORKSPACE so "deploy from dev workspace" builds on the owning
// host. Every addition is new RPCs/messages — the contract version stays V1
// (additive, never a redesign; D6's forward-compat principle holds).
//
// The agent's CALL-HOME BOOTSTRAP (PLAN P1-P4) is deliberately NOT a method on
// this service: it travels agent -> control plane (the opposite direction of
// every RPC here, which is control plane -> agent), is a one-shot HTTP POST over
// a fingerprint-pinned TLS channel, and happens BEFORE the mTLS identity this
// service requires even exists. It lives at the control plane's /api/agent/
// bootstrap endpoint; see lib/agent/bootstrap.ts and app/api/agent/bootstrap.
package deplo.agent.v1;

option go_package = "github.com/DeploCloud/deplo-agent/gen;agentpb";

// CONTRACT VERSION. Bumped when the wire contract changes incompatibly. The
// control plane sends its version in HelloRequest and the agent echoes its own
// in HelloResponse; a mismatch is surfaced, never silently tolerated.
enum ContractVersion {
  CONTRACT_VERSION_UNSPECIFIED = 0;
  CONTRACT_VERSION_V1 = 1;
}

service Agent {
  // Health + identity handshake. The control plane calls this as a mandatory
  // pre-flight before every deploy (PLAN P5): if the agent does not answer, the
  // deploy fails immediately with "server unreachable" rather than hanging.
  rpc Hello(HelloRequest) returns (HelloResponse);

  // Host CPU/mem/disk/net snapshot. Replaces lib/infra/host.ts per server.
  // (Wired into getServerMetrics in Part C; defined now so the contract is whole.)
  rpc Metrics(MetricsRequest) returns (HostMetrics);

  // Per-CONTAINER live resource snapshot (`docker stats --no-stream`) for the
  // named containers of ONE project — the data source for the per-app /
  // per-database Monitoring tab, next to the host-level Metrics above. Scoped to
  // a project by label (deplo.project=<project_id>) exactly like the Part C
  // container RPCs, so a container name off the wire can never stat a sibling
  // project's container. ADDITIVE: gated by the "container-stats" capability.
  rpc ContainerStats(ContainerStatsRequest) returns (ContainerStatsResponse);

  // ONE long-lived stream carrying this host's metrics AND every Deplo-managed
  // container's stats, sampled on the AGENT's own ticker. Replaces the
  // per-viewer, per-resource Metrics/ContainerStats poll: the control plane
  // opens exactly one of these per server and demuxes frames into its RAM ring
  // buffer, so telemetry cost is O(hosts) — independent of how many containers
  // run there and how many people are looking.
  //
  // The agent is still a pure gRPC SERVER: the control plane dials and the agent
  // streams, exactly like FollowLogs. There is no agent->control-plane channel.
  //
  // Container scoping is by the deplo.managed=true label, NEVER an empty filter
  // (which would enumerate every container on the host, including ones Deplo
  // does not own). Each stat carries its deplo.project label so the control
  // plane demuxes to an App / Database without a second lookup.
  //
  // ADDITIVE: gated by the "metrics-stream" capability. An agent without it
  // keeps serving the unary Metrics / ContainerStats poll unchanged, and the
  // control plane falls back to polling that ONE server.
  rpc StreamMetrics(MetricsStreamRequest) returns (stream MetricsSample);

  // Deploy lifecycle. Server-streaming so build/run logs flow live, in one
  // connection, into the control plane's existing per-deployment log + status
  // writes (which republish over the GraphQL SSE subscriptions unchanged).
  rpc Deploy(DeployRequest) returns (stream DeployEvent);

  // Reconnect to an in-flight (or just-finished) deploy and replay the events
  // the control plane missed (PLAN D5, Part-B half). Remote builds are long and
  // costly to lose, so the agent keeps a bounded record of each deploy's events
  // keyed by deploy_id; if the control plane drops mid-build it dials back with
  // ReattachDeploy(deploy_id, from_seq) and the agent replays from the cursor,
  // then continues streaming live events as the build proceeds. Returns
  // NOT_FOUND if the agent has no record of that deploy (it never ran there, or
  // its record was evicted) — the control plane then reconciles it to error.
  rpc ReattachDeploy(ReattachRequest) returns (stream DeployEvent);

  // Lifecycle control over an already-deployed stack. These replace the direct
  // stop/start/destroy docker calls in lib/deploy/build.ts for agent-owned
  // stacks. (Wired in a later step; defined now so the boundary is complete.)
  rpc StopStack(StackRef) returns (StackResult);
  rpc StartStack(StackRef) returns (StackResult);
  rpc DestroyStack(StackRef) returns (StackResult);

  // Re-apply routing to a running stack WITHOUT a rebuild. The control plane
  // re-renders the stack YAML with the new domain set (renderCompose /
  // buildComposeStack stay the single TS source of truth) and sends it; the agent
  // overwrites <stack_dir>/<slug>.yml (+ the env-file and any compose mount files)
  // and `docker compose up -d --remove-orphans`, which recreates only the routed
  // service in place so Traefik picks up the new labels. Replaces the in-process
  // reroute that read/wrote the stack file on the control plane's own disk.
  rpc Reroute(RerouteRequest) returns (StackResult);

  // Copy a single Docker named volume across HOSTS, for a server MOVE (a
  // database/project relocating to another server). Docker named volumes are
  // host-local and the agent trust model is strictly star (an agent can neither
  // dial nor trust a peer agent), so a volume cannot be copied host-to-host
  // directly — instead the control plane RELAYS the bytes: it calls ExportVolume
  // on the SOURCE agent (streaming the volume's gzipped tar out), and feeds those
  // chunks into ImportVolume on the DESTINATION agent (which untars them into the
  // target volume). No S3 hop and no agent↔agent connection.
  //
  // ExportVolume tars the named volume from inside a read-only helper container
  // (the same busybox `tar -C /v -cf -` used by Backup's archiveVolume), gzips it,
  // and streams it as raw byte chunks. The caller is expected to have QUIESCED the
  // source (stopped the stack) first so the on-disk files can't change mid-read —
  // the agent does not stop anything here (it only reads), keeping this a pure,
  // reusable primitive. Any agent advertising the "volume-copy" capability serves
  // it; an older agent returns UNIMPLEMENTED, which the control plane maps to an
  // "update the agent" error.
  rpc ExportVolume(ExportVolumeRequest) returns (stream VolumeChunk);

  // The destination half of a cross-host volume copy (see ExportVolume). The FIRST
  // client message MUST be a VolumeChunk carrying `header` (the target volume name +
  // whether to wipe it first); every subsequent message carries `data` (a raw slice
  // of the gzipped tar produced by ExportVolume). The agent wipes the target volume
  // (unless told not to), then untars the reassembled stream into it via a helper
  // container (the same `tar -C /v -xf -` used by Restore). The caller MUST have
  // stopped the destination stack first so nothing writes the volume under the
  // untar. Terminal StackResult reports success/failure of the whole import.
  rpc ImportVolume(stream VolumeChunk) returns (StackResult);

  // Copy a service's host-side FILES DIR (<stack_dir>/files/<slug>) across hosts,
  // for a server move — the sibling of ExportVolume/ImportVolume for the one piece
  // of a service's state that is NOT a Docker volume. The files dir holds a
  // compose-stack's `./` bind-mount files, template config-file mounts, and
  // `type: "service"` volume mounts; most of it is re-materialised from the control
  // plane on a deploy, but any RUNTIME data written under it would otherwise be lost
  // on a move. ExportFiles tars the dir out (gzipped) and streams it; a missing dir
  // streams an empty archive (not an error). Same relay + capability model as the
  // volume RPCs.
  rpc ExportFiles(ExportFilesRequest) returns (stream FilesChunk);

  // The destination half of a files-dir copy (see ExportFiles). The FIRST client
  // message MUST be a FilesChunk carrying `header` (the target slug + wipe flag);
  // every subsequent message carries `data` (a slice of the gzipped tar). The agent
  // wipes the target files dir (unless told not to), then untars the stream into it
  // (anti-traversal enforced, symlinks skipped — same guard as Restore's files/
  // arm). The caller must have stopped the destination stack first. Terminal
  // StackResult reports success/failure.
  rpc ImportFiles(stream FilesChunk) returns (StackResult);

  // Read back the rendered stack YAML the agent has on disk (<stack_dir>/<slug>.yml)
  // for the "View full compose" preview. The single-image/built stack's image ref
  // + env live only in this file (not on the project), so the preview must read it
  // from the owning host. Returns exists=false (empty yaml) when no stack file is
  // present yet (never deployed).
  rpc ReadStack(StackRef) returns (ReadStackResponse);

  // Container introspection (status/running) for the live-status subscriptions.
  rpc Inspect(InspectRequest) returns (InspectResponse);

  // Whether a HOST TCP port is free to publish. The control plane calls this
  // BEFORE provisioning a database with "Expose publicly" (a published `ports:`
  // mapping) so a port already taken — by another Deplo stack OR by any non-Deplo
  // host process (a system Postgres on 5432, the control plane's own DB, …) —
  // fails the creation up front with a clear message rather than leaving a
  // half-provisioned container whose `compose up` lost the port bind. The agent
  // answers by attempting to BIND the port on the host (0.0.0.0 + ::, then
  // immediately closing): a bind is the only check that sees BOTH Docker-published
  // ports and raw host listeners, with no output parsing. Gated behind the
  // "checkport" Hello capability so an older agent surfaces "update the agent"
  // rather than a fake "available".
  rpc CheckPort(CheckPortRequest) returns (CheckPortResponse);

  // Reclaim Docker disk on the host. STRICTLY AN ALLOW-LIST: the agent removes
  // only what it can PROVE is unreferenced, and the proof is always a
  // container-reference REVERSE INDEX over `docker ps -aq` (running AND exited) or
  // an on-disk sentinel — never a label, because a genuine app container may carry
  // no `deplo.*` label at all (`deplo-myapp-web-1` does not). It therefore never
  // runs `docker system prune`, `container prune`, `volume prune` or `network
  // prune`: on a Deplo host a STOPPED app is a LIVE app (StopStack is `compose
  // stop`, StartStack is `compose start` — the container, its volumes and its
  // networks must all survive a stop), and a dangling volume may hold a database's
  // data files. Those verbs are absent from CleanupScope and must never be added.
  //
  // With dry_run the agent enumerates candidates and reclaims NOTHING, filling in
  // every result field as if it had — this is what the UI calls first, to render
  // the confirm dialog. A scope that fails, or that the agent declines because it
  // could not build the reverse index and refuses to guess, is reported per-scope
  // and the sweep carries on; ok=false is reserved for a sweep that could not start
  // at all (UNAVAILABLE when Docker is unreachable). Gated behind the
  // "docker-cleanup" Hello capability so an older agent surfaces "update the agent"
  // rather than a fake success.
  rpc DockerCleanup(DockerCleanupRequest) returns (DockerCleanupResponse);

  // Update the agent BINARY in place to a newer release, WITHOUT re-bootstrapping
  // — the agent's mTLS materials (agent.crt/agent.key/ca.crt under --agent-dir)
  // are NEVER touched, so the server keeps its identity and pinned fingerprint
  // across the upgrade and stays "online". This is the in-place sibling of
  // re-running install-agent.sh (which mints a fresh token and re-bootstraps,
  // resetting trust). The control plane resolves the latest release (the SAME
  // GitHub release the install path uses) and sends the per-arch download URL +
  // its sha256 here; the agent downloads, VERIFIES the checksum (refusing a
  // mismatch, exactly like the installer's P2 guard), atomically swaps its own
  // on-disk binary, replies, then re-execs ITSELF (syscall.Exec — same PID, same
  // argv, same env; no exit, so a supervisor's Restart policy is not involved).
  // The re-execed binary finds the existing materials and serves straight away —
  // no call-home.
  // INVARIANT: trust material is out of scope here; a SelfUpdate can change the
  // code but never the identity. Returns FAILED_PRECONDITION when the agent can't
  // locate/replace its own binary (e.g. a read-only install dir), so the control
  // plane can tell the operator to fall back to re-running the installer.
  rpc SelfUpdate(SelfUpdateRequest) returns (SelfUpdateResponse);

  // ---- BACKUPS: dump/restore a database or project to/from S3, and the S3
  // affordances the control plane needs (connectivity check + object delete).
  // Routes ALL backup work through the OWNING server's agent (ADR-0007): the
  // agent has the Docker socket + host fs the dump needs, and an S3 client
  // (minio-go) so the bytes never round-trip through the control plane. The
  // control plane stays the source of truth — it decrypts the S3 creds and
  // builds the object key, then sends them here over mTLS; the agent streams
  // the dump straight to (or from) the bucket. Gated behind the "backup"
  // Hello capability so an older agent surfaces a clear "update the agent"
  // error rather than a fake success (forward-compatible, D6). ----

  // Back up a database or a project to S3, streaming progress. DATABASE → the
  // agent `docker exec`s the engine's dump tool (per the format table in
  // docs/research/dbs-backups/PLAN.md), gzip-compresses the stream, and uploads
  // it to S3 via a multipart PUT (minio-go), so no temp file and no
  // control-plane round-trip. PROJECT → the agent tars the project's named +
  // compose-stack volumes (via a throwaway helper container that mounts them),
  // the project files dir, and the rendered compose/env snapshot, gzip-compresses,
  // and uploads. Host bind mounts are EXCLUDED (shared cross-tenant paths,
  // outside Deplo). The terminal BackupResult carries the final object key +
  // byte size the control plane records on the BackupRun.
  rpc Backup(BackupRequest) returns (stream BackupEvent);

  // Restore a database or project from a previously-uploaded S3 object, IN
  // PLACE, streaming progress. DATABASE → download the object, decompress, and
  // restore per the format table — drop-and-recreate, guaranteed by the dump
  // format (pg `--clean --if-exists`, mysql `--add-drop-table`, mongo `--drop`)
  // so a restore overwrites rather than appends. PROJECT → stop the stack, wipe
  // + untar the volumes + files, re-`Reroute` the snapshot compose/env (which
  // restarts the stack) = full data + config in place. A restart failure (e.g.
  // a snapshot image that no longer exists) is reported clearly on the stream
  // rather than silently leaving the stack down.
  rpc Restore(RestoreRequest) returns (stream RestoreEvent);

  // Verify S3 connectivity + the destination bucket for the "Test connection"
  // button (makes lib/data/s3.ts testS3 real). The agent HEADs/stats the bucket
  // with the supplied creds and reports reachable + writable, with a human
  // message on failure. Any agent advertising "backup" can serve it — it needs
  // no Docker, only the S3 client — so the control plane can run it on any
  // reachable backup-capable server.
  rpc S3Check(S3CheckRequest) returns (S3CheckResponse);

  // Delete S3 objects by exact key or by prefix. Backs retention pruning (the
  // control plane deletes objects older than retentionDays for a backup) and
  // the "delete artifacts too" branch of target deletion. Idempotent: a missing
  // object is not an error. Returns how many objects were removed.
  rpc S3Delete(S3DeleteRequest) returns (S3DeleteResponse);

  // ---- PART C: console observability (replaces lib/logs + lib/attach +
  // the direct-Docker half of lib/data/console.ts for remote projects) ----

  // Stream a container's live runtime logs (`docker logs -f --tail N`) as raw
  // byte chunks. Output-only — there is no stdin. The control plane proxies these
  // chunks straight into the unchanged SSE log route. Closing the stream (browser
  // disconnect) cancels the RPC, which kills the agent's `docker logs` client
  // only — never the container. Works on a stopped container (tails its recorded
  // output, then ends).
  rpc FollowLogs(FollowLogsRequest) returns (stream LogChunk);

  // Interactive `docker attach` to a running container, full-duplex over one bidi
  // stream. The FIRST client message MUST be an AttachOpen (selects the container,
  // declares tty + initial size); subsequent client messages are stdin bytes or a
  // resize. The agent streams the container's merged output down. `--sig-proxy` is
  // off, so a client disconnect never signals the container. The pty backing (Go
  // creack/pty) lives here now (was Node node-pty), so tty containers get a real
  // terminal regardless of the agent host.
  rpc Attach(stream AttachInput) returns (stream AttachOutput);

  // Every attachable container in a project's stack (replaces listInstances +
  // inspectRuntime + inspectStdio in lib/data/console.ts), default (exposed/
  // running) first. Carries the project id + slug + exposed-service so the agent
  // can label-filter and order without knowing Deplo's store.
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse);

  // Run a command in a container (`docker exec`), replacing execInContainer. The
  // agent detects the image's shell (or falls back to raw argv on distroless) and
  // returns the guest exit code/stdout/stderr instead of erroring on a non-zero
  // exit — the REPL renders failures. A docker/OCI-level failure (no such
  // container, stopped, no shell) is a gRPC error, not a guest exit.
  rpc Exec(ExecRequest) returns (ExecResponse);

  // The default (or chosen) container's shell label ("/bin/sh" | "/bin/bash" |
  // "raw exec (no shell)") for the console banner — replaces shellLabel.
  rpc ShellLabel(ShellLabelRequest) returns (ShellLabelResponse);

  // ---- PART C: project config files (repoints lib/data/project-files.ts off
  // the control plane's local fs onto the project's host; the anti-traversal
  // sandbox is re-enforced agent-side via internal/safepath since the path
  // arrives off the wire) ----

  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  rpc WriteFile(WriteFileRequest) returns (FileEntryResult);
  rpc UploadFile(UploadFileRequest) returns (FileEntryResult);
  rpc CreateDir(CreateDirRequest) returns (FileEntryResult);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResult);
  rpc RenameFile(RenameFileRequest) returns (FileEntryResult);
  // Whether a project's files root exists on this host (drives the Files tab).
  rpc FilesExist(FilesExistRequest) returns (FilesExistResponse);

  // ---- PART D: dev containers + SSH gateway per server (repoints
  // lib/deploy/dev.ts + lib/infra/ssh-gateway.ts off the control plane's local
  // Docker/fs onto the project's host). Dev containers + the SSH gateway are
  // per-host singletons (ADR-0002); once a project can live on a remote server,
  // its dev container + gateway must run THERE. The control plane stays the
  // source of truth: it renders the dev compose (renderDevCompose), the dev
  // entrypoint script, the gateway config files, and the per-user provision/
  // deprovision exec-steps (same D2 single-renderer principle as the production
  // compose) and ships them opaque; the agent writes files + drives Docker. The
  // store's DevSshUser[] / Project.dev remain authoritative (ADR-0002). ----

  // Start (or restart) a project's dev container. Server-streaming like Deploy
  // (it materialises the workspace, ensures the gateway, pre-chowns, writes the
  // stack, `compose up`s) so progress logs flow live into the same SSE plumbing.
  // The control plane sends the rendered dev compose + entrypoint + (for git) the
  // tokenized clone URL + (for upload) the archive; the agent stays dumb.
  rpc StartDev(StartDevRequest) returns (stream DeployEvent);
  // Stop a project's dev container (reversible — KEEPS the workspace + deps
  // volume so a later StartDev resumes the edited tree). Also stops the tunnel.
  rpc StopDev(StopDevRequest) returns (StackResult);
  // DESTRUCTIVE: wipe the workspace + deps volume, then reseed via StartDev's
  // body. The request carries the same StartDevRequest payload used to reseed.
  rpc ResetDevWorkspace(StartDevRequest) returns (stream DeployEvent);
  // Fully tear down on PROJECT DELETE: stop the stack, remove the stack file +
  // deps volume, WIPE the workspace dir. The gateway singleton is NOT torn down
  // (its per-project users are removed via DeprovisionSshUser).
  rpc TeardownDev(TeardownDevRequest) returns (StackResult);

  // ---- SSH gateway (the per-host singleton, ADR-0002) ----

  // Lazily ensure the 2-service SSH gateway stack is up on this host (idempotent;
  // ensureNetwork + write the rendered config files + `compose up` + wait for
  // sshd + reconcile every supplied user). The control plane sends the rendered
  // files (sshd_config / wrapper / socket-filter / compose / entrypoint) and the
  // full provision step-list for every stored DevSshUser of this server so the
  // agent rebuilds the projection from the store's truth (ADR-0002).
  rpc EnsureGateway(EnsureGatewayRequest) returns (StackResult);
  // Provision one user inside the running gateway by running the control-plane-
  // computed exec steps (the password, if any, rides in a step's stdin — never
  // argv/env). Ensures the gateway first (carries the same gateway payload).
  rpc ProvisionSshUser(ProvisionSshUserRequest) returns (StackResult);
  // Remove one user from the gateway (account + key + map files). No-op if the
  // gateway isn't running. Runs the control-plane-computed deprovision steps.
  rpc DeprovisionSshUser(DeprovisionSshUserRequest) returns (StackResult);

  // ---- VS Code Remote Tunnel (the editor integration for an exec-only gateway).
  // `code tunnel` runs INSIDE the dev container and dials OUT to Microsoft's
  // relay over HTTPS — no inbound port, no gateway change. These RPCs are thin
  // `docker exec` wrappers; the LOG PARSING (device-login link, connected URL)
  // stays pure in the control plane (parseTunnelLog). ----

  // Launch the tunnel (idempotent) and return the current raw log + running flag.
  rpc StartTunnel(TunnelRequest) returns (TunnelStatus);
  // Read the current tunnel log + running flag (no side effects).
  rpc GetTunnel(TunnelRequest) returns (TunnelStatus);
  // Stop the tunnel process (the CLI download + auth token are kept).
  rpc StopTunnel(TunnelRequest) returns (StackResult);
}

// ---------------------------------------------------------------------------
// Hello / identity
// ---------------------------------------------------------------------------

message HelloRequest {
  // The contract version the control plane speaks.
  ContractVersion contract_version = 1;
  // Opaque control-plane build string, for the agent's logs (not a trust input).
  string control_plane_version = 2;
}

message HelloResponse {
  // The contract version the agent speaks. Compared against the request's.
  ContractVersion contract_version = 1;
  // Agent binary version (e.g. a git describe), for diagnostics.
  string agent_version = 2;
  // Whether a Docker daemon is reachable from the agent. A false here is a
  // clear, early "server can't deploy" signal.
  bool docker_available = 3;
  // Docker server engine version, or "" if unreachable.
  string docker_version = 4;
  // Coarse capability flags so the control plane can route only what this agent
  // supports (Part A: a localhost agent that handles the Dockerfile build +
  // single-image compose-up path). Absent capability => control plane keeps the
  // local fallback path. Forward-compatible: new capabilities are new entries.
  // The "backup" capability gates the Backup/Restore/S3Check/S3Delete RPCs: the
  // control plane preflights it (AgentBackupUnsupportedError when absent) so an
  // older agent gives a clear "update the agent" message, never a fake success.
  repeated string capabilities = 5;
  // Whether a Traefik reverse proxy is running on this host (a container on the
  // shared `deplo` network that reads the deploy labels and routes traffic).
  // Read LIVE by the agent, so the control plane can set the server's
  // `traefikEnabled` from each Hello rather than a stored value that goes stale —
  // the same read-live-not-stored model as health. Without Traefik, deployed
  // apps run on the host but are not reachable on their domains.
  bool traefik_running = 6;
}

// ---------------------------------------------------------------------------
// Metrics
// ---------------------------------------------------------------------------

message MetricsRequest {
  // The path whose filesystem to measure for disk usage (the agent's data dir).
  // Empty => the agent's default ("/").
  string data_dir = 1;
}

message HostMetrics {
  double cpu = 1;        // 0-100
  int32 cpu_cores = 2;
  int64 mem_used = 3;    // bytes
  int64 mem_total = 4;
  double mem_pct = 5;
  int64 disk_used = 6;   // bytes
  int64 disk_total = 7;
  double disk_pct = 8;
  int64 net_rx = 9;      // bytes/sec
  int64 net_tx = 10;     // bytes/sec
  double load1 = 11;
  double load5 = 12;
  double load15 = 13;
  int64 uptime_sec = 14;
  int32 running_containers = 15;
}

// ---------------------------------------------------------------------------
// Deploy
// ---------------------------------------------------------------------------

// Where the agent gets the bytes it builds/runs. Part A implemented UPLOAD
// (archive streamed inside the Deploy RPC) and IMAGE (an already-built image ref
// the agent runs as-is). Part B implements GIT (the agent clones with a
// short-lived token, D3) so a remote build never ships the whole repo over the
// wire — only the clone URL + branch + ephemeral token. New sources (e.g.
// registry pull) are new enum cases — not a redesign (D6).
enum SourceKind {
  SOURCE_KIND_UNSPECIFIED = 0;
  // The control plane streams a tar archive of the materialised build context
  // inside this Deploy call (see DeployRequest.context_chunk). One direction of
  // traffic, one mTLS channel, no second control-plane endpoint (D3).
  SOURCE_KIND_UPLOAD = 1;
  // The agent runs a prebuilt image as-is (source: docker-image). No build.
  SOURCE_KIND_IMAGE = 2;
  // The agent clones a git URL itself with a short-lived token. PART B.
  SOURCE_KIND_GIT = 3;
  // A multi-service compose stack: the control plane rendered the full stack
  // (buildComposeStack — Traefik labels, deplo-network wiring, the deplo.* labels
  // on EVERY service) into compose_yaml; the agent neither builds nor pulls an
  // image (each service's image comes up via `docker compose up` itself). The
  // agent writes the env map to a 0600 --env-file (the YAML interpolates `${VAR}`
  // — it is NOT baked in like the single-image path), writes any `mounts`
  // (template config files) under <stack_dir>/files/<slug>, then `compose up`s and
  // waits for the stack by LABEL (deplo.slug), since the containers are
  // compose-prefixed, not named deplo-<slug>. PART C.
  SOURCE_KIND_COMPOSE = 4;
  // PART D: "deploy from dev workspace". The build context is the project's
  // PERSISTENT dev workspace already on THIS agent's host (<dev-dir>/<slug>) —
  // the developer's live, edited tree. The agent copies it into a fresh build
  // dir EXCLUDING the non-source entries (node_modules / .deplo / .deplo-home /
  // .git — same WORKSPACE_BUILD_EXCLUDE the control plane's copyWorkspaceForBuild
  // applies) and rejects symlinks (the tree is attacker-controlled, UID-1000
  // shell/SSH access), then builds it exactly like UPLOAD. No workspace bytes
  // cross the wire — the build stays on the owning host. Only the Dockerfile
  // descriptor + image_ref travel in the request, like GIT.
  SOURCE_KIND_DEV_WORKSPACE = 5;
}

// How the agent turns the build context into an image. The DOCKERFILE family (an
// explicit or generated Dockerfile, the most common path) was Part A; the heavier
// builders (Nixpacks/Buildpacks/Railpack/static) — ported from the control plane's
// old in-process builders (lib/deploy/builders.ts) — now ALSO run agent-side, each
// keyed by a BuildKind below and parameterised by DeployRequest.build_spec. NONE
// means "no build, run the IMAGE source directly". A heavy kind is only sent to an
// agent whose Hello advertised the matching capability (deploy.nixpacks / .static /
// .buildpacks / .railpack); an older agent surfaces a clear "update the agent"
// error rather than silently mishandling the request — forward-compatible (D6).
enum BuildKind {
  BUILD_KIND_UNSPECIFIED = 0;
  BUILD_KIND_NONE = 1;        // SOURCE_KIND_IMAGE: run as-is, no build
  BUILD_KIND_DOCKERFILE = 2;  // build from a Dockerfile in the context
  // The heavy builders. Each reads DeployRequest.build_spec for its method
  // settings (port, commands, runtime version, per-method knobs). The agent ports
  // builders.ts byte-for-byte so an image built here matches the old local path.
  BUILD_KIND_STATIC = 3;      // nginx serves a build output (buildStatic)
  BUILD_KIND_NIXPACKS = 4;    // nixpacks generates a Dockerfile, then docker build
  BUILD_KIND_BUILDPACKS = 5;  // Cloud Native Buildpacks via `pack` (heroku|paketo)
  BUILD_KIND_RAILPACK = 6;    // railpack plan + buildkitd/buildctl
}

// The build method's settings for a heavy BuildKind (STATIC/NIXPACKS/BUILDPACKS/
// RAILPACK). Mirrors the fields lib/deploy/builders.ts reads off BuildConfig +
// methodSettings, flattened onto the wire. The control plane is the single source
// of truth: it resolves the framework's runtime language (runtimeFor().language)
// so the agent stays dumb about Deplo's framework registry. Only the fields the
// chosen method uses are read; the rest are ignored. Present iff build_kind is one
// of the heavy kinds (DeployRequest.build_spec).
message BuildSpec {
  // The build method name, for logs + the buildpacks flavor select
  // ("nixpacks"|"heroku"|"paketo"|"railpack"|"static"). The agent dispatches on
  // build_kind, not this string; it is the human label + the heroku/paketo split.
  string method = 1;
  // The container port the app listens on (drives PORT/--build-arg PORT and the
  // nginx `listen`). 0 => the method's default (nginx 80).
  int32 port = 2;
  // Build commands (empty => the method's own default / detection). Mirror
  // BuildConfig.installCommand / buildCommand / startCommand.
  string install_command = 3;
  string build_command = 4;
  string start_command = 5;
  // The static method's output dir to serve (BuildConfig.outputDirectory). Empty
  // => ".".
  string output_directory = 6;
  // The runtime version the user pinned (BuildConfig.runtimeVersion), e.g. "20".
  // Empty => the method's default.
  string runtime_version = 7;
  // The framework's runtime language, resolved control-plane-side via
  // runtimeFor(framework).language ("node"|"python"|…|"none"). Used to pin the
  // nixpacks per-language version var (NIXPACKS_<LANG>_VERSION) and to gate the
  // static builder's Node builder stage. Empty/"none" => no language pin.
  string runtime_language = 8;
  // nixpacks: the dir the build publishes/serves; non-empty switches nixpacks to
  // the nginx-wrap static path (methodSettings.nixpacksPublishDirectory).
  string nixpacks_publish_directory = 9;
  // heroku: builder image version ("22"|"24"|"26"); maps to heroku/builder:<v>.
  // Empty => "24". Ignored for paketo (methodSettings.herokuVersion).
  string heroku_version = 10;
  // railpack: CLI/frontend version pin ("latest" or "0.27.2"); empty => latest
  // (methodSettings.railpackVersion).
  string railpack_version = 11;
  // static / nixpacks-static: serve as an SPA (history-API fallback to
  // index.html) (methodSettings.staticSinglePageApp).
  bool static_single_page_app = 12;
}

// A git source the agent clones itself (SOURCE_KIND_GIT, D3). The control plane
// resolves the clone URL and mints a SHORT-LIVED token (e.g. a GitHub App
// installation token, ~1h) and sends both inside the Deploy request over mTLS;
// the agent clones, resolves the commit sha (reported back in DeployResult), and
// builds locally. The token is the only secret here and it is ephemeral —
// nothing long-lived crosses the wire, and the agent never persists it.
message GitSource {
  // The clone URL. For a private GitHub repo the control plane has already
  // embedded the installation token (https://x-access-token:<tok>@github.com/...);
  // `token` below is then empty. For other providers the agent injects `token`
  // into the URL itself. Either way the agent treats the resulting URL as opaque.
  string url = 1;
  // The branch (or ref) to check out. Empty => the remote's default branch.
  string branch = 2;
  // An optional short-lived credential the agent injects as the URL's
  // x-access-token (when `url` does not already carry one). Empty for public
  // repos or when the token is already baked into `url`. Never logged.
  string token = 3;
  // Sub-directory within the repo to build from (the project's rootDirectory),
  // relative to the clone root. Empty => the repo root. Re-validated against the
  // clone root inside the agent (anti-escape, like the Dockerfile paths).
  string subdir = 4;
}

message DockerfileBuild {
  // Path to the Dockerfile, relative to the build context root. Empty =>
  // "Dockerfile". Re-validated against the context root inside the agent (the
  // anti-escape check is re-ported to Go — path validation runs where the I/O
  // runs, never trusting a path off the wire).
  string dockerfile_path = 1;
  // Build context dir, relative to the context root. Empty => ".".
  string context_path = 2;
  // Optional --target stage in a multi-stage Dockerfile.
  string target_stage = 3;
  // When true the agent has no Dockerfile in the context and must build the
  // provided generated_dockerfile content instead (the legacy/auto path).
  bool generated = 4;
  // The generated Dockerfile body (only when `generated` is true). Rendered by
  // the control plane (generateDockerfile) so the agent stays dumb about
  // framework presets — same single-source-of-truth principle as the compose.
  string generated_dockerfile = 5;
}

// One template config file a compose stack bind-mounts (SOURCE_KIND_COMPOSE).
// The control plane carries the file CONTENT (it lives in its store, not on the
// remote host); the agent materialises it under <stack_dir>/files/<slug>/<path>
// before `compose up` — the rendered compose already points its bind sources at
// that directory. `path` is relative to the project files dir; the agent rejects
// any `..` segment or absolute path (the content arrives off the wire — same
// anti-escape guard as the build context and the file RPCs).
message MountFile {
  string path = 1;
  string content = 2;
}

message DeployRequest {
  // A stable id for this deploy, minted by the control plane (the Deployment
  // row id). Carried from day one so the agent can key an in-flight record and a
  // future re-attach RPC can replay by it (D5). The control plane reconciles a
  // still-"building" deploy to error on restart even though Part A is otherwise
  // fire-and-forget.
  string deploy_id = 1;

  // Project identity. `slug` keys the stack file, compose project, container
  // name and labels on the agent; `project_id` goes into the deplo.* labels.
  string slug = 2;
  string project_id = 3;

  // The target image tag the agent builds/runs, e.g. deplo/<slug>:<sha12>.
  string image_ref = 4;

  SourceKind source_kind = 5;
  BuildKind build_kind = 6;
  // Present iff build_kind == DOCKERFILE.
  DockerfileBuild dockerfile = 7;

  // Present iff source_kind == GIT (Part B). The agent clones this itself; the
  // control plane does not tar a context for git sources targeting a remote
  // agent — only the descriptor crosses the wire (D3).
  GitSource git = 13;

  // The fully-rendered compose YAML (D2): renderCompose stays the single TS
  // source of truth; the agent receives opaque YAML and never re-implements
  // routing/label logic in Go. The agent writes it to <stack_dir>/<slug>.yml and
  // `docker compose up`s it.
  string compose_yaml = 8;

  // The resolved, DECRYPTED env map (D4). The control plane decrypts via
  // revealEnv and sends plaintext over mTLS; the agent writes it to a 0600
  // env-file and never holds the encryption key. For the single-image path this
  // is already baked into compose_yaml's `environment:`; it is sent separately
  // too so a future compose-stack path can use it as the --env-file.
  map<string, string> env = 9;

  // How long to wait for the container to report running before declaring the
  // deploy errored, in milliseconds. 0 => the agent's default.
  int64 ready_timeout_ms = 10;

  // The streamed build context, used iff source_kind == UPLOAD. The FIRST
  // DeployRequest on the stream carries all the fields above; SUBSEQUENT
  // messages on the stream carry ONLY context_chunk frames (every other field
  // empty) until an empty/final marker. (Deploy is currently a unary request +
  // server stream; the upload is chunked via repeated client messages once the
  // RPC is made client-streaming in Part B. For Part A the archive is small
  // enough to ride in a single bytes field.)
  bytes context_tar = 11;

  // True when image_ref must be pulled before running (SOURCE_KIND_IMAGE with a
  // remote registry ref). The agent `docker pull`s it, streaming progress.
  bool pull_image = 12;

  // Template config files a multi-service compose stack bind-mounts
  // (SOURCE_KIND_COMPOSE). Written under <stack_dir>/files/<slug>/ before
  // `compose up`. Empty for every other source kind.
  repeated MountFile mounts = 14;

  // The rootDirectory subdir within the dev workspace to build from, relative to
  // the workspace root (SOURCE_KIND_DEV_WORKSPACE, Part D). Empty => the workspace
  // root. Re-validated against the materialised build dir inside the agent
  // (anti-escape, like the GIT subdir). Mirrors how the git arm passes
  // project.build.rootDirectory as GitSource.subdir.
  string dev_workspace_subdir = 15;

  // The heavy build method's settings — present iff build_kind is STATIC /
  // NIXPACKS / BUILDPACKS / RAILPACK. The agent reads the fields its method uses
  // and ignores the rest. Absent for BUILD_KIND_DOCKERFILE (which uses
  // `dockerfile` above) and BUILD_KIND_NONE.
  BuildSpec build_spec = 16;
}

// One event in the deploy stream. Exactly one of the oneof arms is set.
message DeployEvent {
  oneof event {
    LogLine log = 1;
    PhaseChange phase = 2;
    DeployResult result = 3;
  }
  // Monotonic per-deploy sequence number (1-based), the REPLAY CURSOR for
  // ReattachDeploy (D5). The agent stamps every event it emits and keeps a
  // bounded buffer of them keyed by deploy_id; a reconnecting control plane
  // asks for everything after the last seq it saw. 0 on a fresh Deploy stream's
  // events is also fine — the control plane only needs ordering on reattach.
  uint64 seq = 4;
}

// Reconnect to an in-flight or recently-finished deploy and replay from a
// cursor (D5). The agent replays buffered events with seq > from_seq, then (if
// the deploy is still running) continues streaming live events; if it already
// finished, it replays through the terminal DeployResult and ends the stream.
message ReattachRequest {
  // The deploy to reattach to (the same stable id from DeployRequest.deploy_id).
  string deploy_id = 1;
  // Replay every buffered event with seq strictly greater than this. 0 => from
  // the very first event the agent still has buffered.
  uint64 from_seq = 2;
}

message LogLine {
  // info | warn | error | debug | command — mirrors lib/types.ts LogLevel so the
  // control plane writes it straight into the deployment log.
  string level = 1;
  string text = 2;
}

enum DeployPhase {
  DEPLOY_PHASE_UNSPECIFIED = 0;
  DEPLOY_PHASE_PREPARING = 1;   // materialising context / pulling
  DEPLOY_PHASE_BUILDING = 2;    // docker build
  DEPLOY_PHASE_STARTING = 3;    // docker compose up
  DEPLOY_PHASE_WAITING = 4;     // waiting for running
}

message PhaseChange {
  DeployPhase phase = 1;
}

message DeployResult {
  // Terminal status: true => the stack reached a running state; false => failed.
  bool ready = 1;
  // A human-readable reason on failure (empty on success).
  string error = 2;
  // The git commit sha the agent resolved when it materialised a GIT source
  // (Part B): the control plane writes it back to the Deployment row. Empty for
  // UPLOAD/IMAGE sources (the control plane already knows the sha, or there is
  // none).
  string commit_sha = 3;
}

// ---------------------------------------------------------------------------
// Stack lifecycle + introspection
// ---------------------------------------------------------------------------

message StackRef {
  string slug = 1;
  // Tear down the stack's named volumes too (`docker compose down -v`) and remove
  // the on-disk compose file. Only DestroyStack honours it; StopStack/StartStack/
  // ReadStack ignore it. Used by database deletion so a DB's data volume is
  // reclaimed rather than orphaned. Added after the agent's initial release —
  // forward-compatible: an older agent ignores the unknown field and falls back to
  // a volume-orphaning `down`. Defaults to false, so app teardown is unchanged.
  bool remove_volumes = 2;
}

message StackResult {
  bool ok = 1;
  string error = 2;
}

// ---------------------------------------------------------------------------
// Cross-host volume copy (server move) — see ExportVolume / ImportVolume
// ---------------------------------------------------------------------------

message ExportVolumeRequest {
  // The FULL Docker named volume to tar out (e.g. `deplo-db-mydb_db-mydb-data`).
  // Re-validated agent-side against the docker-volume-name pattern before it is
  // interpolated into `-v <name>:/v` — a value like "/" or "/etc" that would
  // bind-mount a host path is rejected (defence in depth behind the control
  // plane's own naming). The volume must already exist on this host.
  string volume_name = 1;
}

// A framed chunk of a cross-host volume transfer. ExportVolume emits a sequence of
// `data` chunks (no header). ImportVolume expects the FIRST message to be a
// `header` and all following messages to be `data`.
message VolumeChunk {
  message Header {
    // The FULL Docker named volume on the DESTINATION host to untar into. Created
    // on demand by the untar helper container if absent; re-validated like
    // ExportVolumeRequest.volume_name.
    string volume_name = 1;
    // Empty the target volume before untarring (default true for a move, so the
    // import overwrites rather than merges into whatever the freshly-provisioned
    // stack initialised). A false value appends onto existing contents.
    bool wipe_first = 2;
  }
  oneof frame {
    Header header = 1;
    // A raw slice of the gzipped tar stream. Chunked well under the gRPC max
    // message size; reassembled in order on the destination.
    bytes data = 2;
  }
}

message ExportFilesRequest {
  // The service slug whose files dir (<stack_dir>/files/<slug>) to tar out.
  // Re-validated agent-side (validateSlug) before it is joined into a path. A
  // missing dir yields an empty archive, not an error.
  string slug = 1;
}

// A framed chunk of a cross-host FILES-DIR transfer, mirroring VolumeChunk.
// ExportFiles emits `data` chunks (no header); ImportFiles expects a `header` first
// then `data` frames.
message FilesChunk {
  message Header {
    // The service slug whose files dir to untar into on the DESTINATION host.
    string slug = 1;
    // Empty the target files dir before untarring (default true for a move).
    bool wipe_first = 2;
  }
  oneof frame {
    Header header = 1;
    bytes data = 2;
  }
}

// A label-only reroute of an already-deployed stack (no build, no env change
// beyond what the control plane re-sends). Mirrors the compose-write half of a
// Deploy: the control plane renders everything, the agent just writes + brings up.
message RerouteRequest {
  // Stack identity — keys the stack file, compose project and container name.
  string slug = 1;
  // The fully re-rendered stack YAML with the new domain/label set. Opaque to the
  // agent (same contract as DeployRequest.compose_yaml).
  string compose_yaml = 2;
  // Decrypted env for ${VAR} interpolation; written to <stack_dir>/<slug>.env
  // (0600) and passed as --env-file. Empty => no env-file.
  map<string, string> env = 3;
  // Compose mount files to (re)materialise under <stack_dir>/files/<slug>/ before
  // bringing the stack up. Empty for single-image projects.
  repeated MountFile mounts = 4;
}

message ReadStackResponse {
  // Whether a stack file exists on disk for this slug.
  bool exists = 1;
  // The rendered stack YAML (empty when exists=false).
  string yaml = 2;
}

message InspectRequest {
  // Inspect by container/stack name (the agent maps slug -> deplo-<slug>).
  string slug = 1;
}

message InspectResponse {
  bool exists = 1;
  bool running = 2;
  // Raw docker state string (running, exited, ...).
  string state = 3;
}

// Ask whether a host TCP port can be published (see the CheckPort RPC comment).
message CheckPortRequest {
  // The host port to test (1-65535). Out-of-range => the agent reports it as not
  // available with a reason, never a bind attempt.
  int32 port = 1;
}

message CheckPortResponse {
  // True when the agent could bind (and immediately released) the port on the
  // host — i.e. nothing else holds it right now.
  bool available = 1;
  // "" when available; otherwise a human-readable reason (in use / out of range).
  string reason = 2;
}

// In-place agent binary update (SelfUpdate). The control plane resolves the
// latest release and sends EVERY published per-arch asset (its download URL + the
// sha256 from the release's checksums.txt — the same integrity source install-
// agent.sh pins). The AGENT selects the asset matching its OWN architecture
// (runtime.GOARCH), exactly as install-agent.sh selects by `uname -m`: the agent
// is the authority on its own host's arch, and the control plane never has to
// learn or store it. The agent stays otherwise dumb — it does not talk to the
// GitHub API or know the release repo, it just fetches the chosen URL, checks the
// digest, and swaps itself. Trust material is NOT in this message and is never
// touched by the update.
message SelfUpdateRequest {
  // The target version, normalized without a leading v (e.g. "1.2.0"). Used only
  // for logging + the response echo; the agent does not gate on it (the control
  // plane already decided this is the version to install).
  string version = 1;
  // The published binaries, keyed by Go arch ("amd64" | "arm64"). The agent picks
  // the entry for its own runtime.GOARCH; if its arch is absent (the release
  // didn't publish it), the update fails with FAILED_PRECONDITION and the running
  // binary is untouched. At least one entry is always present.
  map<string, ArchBinary> binaries = 2;
}

// One published binary asset for a single architecture.
message ArchBinary {
  // The asset download URL. The agent treats the bytes as opaque until the
  // checksum passes.
  string url = 1;
  // Lowercase hex sha256 the downloaded bytes MUST match. A mismatch aborts the
  // update with FAILED_PRECONDITION and the running binary is left untouched —
  // the agent never execs an unverified binary (install-agent.sh P2 parity).
  string sha256 = 2;
}

message SelfUpdateResponse {
  // The version now staged on disk (echoes the request's version on success).
  string version = 1;
  // True once the new binary is in place and the agent is about to restart to
  // exec it. The control plane uses this as the "update applied" signal; shortly
  // after replying the agent re-execs ITSELF via syscall.Exec — the process is
  // REPLACED in place (same PID, same argv, same env), it does NOT exit, so no
  // supervisor (systemd Restart=on-failure) is involved. The freshly-swapped
  // binary reuses the existing mTLS materials.
  bool restarting = 2;
}

// ---------------------------------------------------------------------------
// BACKUPS — dump/restore to S3 (Backup / Restore / S3Check / S3Delete)
// ---------------------------------------------------------------------------

// What a backup/restore targets. A DATABASE is dumped via the engine's tool
// (`docker exec`); a PROJECT is the tar of its volumes + files + the compose/
// env snapshot. New kinds are new enum cases, never a redesign (D6).
enum BackupKind {
  BACKUP_KIND_UNSPECIFIED = 0;
  BACKUP_KIND_DATABASE = 1;
  BACKUP_KIND_PROJECT = 2;
}

// The S3 destination the agent reads/writes with — the DECRYPTED creds (the
// control plane decrypts via decryptSecret and sends plaintext over mTLS; the
// agent never holds the encryption key, mirroring Deploy's env handling) plus
// the bucket coordinates and the exact object key. `object_key` is built by the
// control plane (deplo/<teamId>/<kind>/<targetId>/<ISO-timestamp>.<ext>) and is
// opaque to the agent. For S3Check it may be empty (a bucket-level probe); for
// S3Delete `object_key` is the key/prefix to remove.
message S3Target {
  string endpoint = 1;     // e.g. s3.amazonaws.com or a MinIO host:port
  string region = 2;       // e.g. us-east-1 ("" => the SDK default)
  string bucket = 3;
  string access_key = 4;   // decrypted; never logged
  string secret_key = 5;   // decrypted; never logged
  string object_key = 6;   // the exact object key (PUT/GET target)
  // Whether to address the bucket path-style (bucket in the URL path, not the
  // host). MinIO / many S3-compatibles need this; AWS uses virtual-host style.
  // The control plane decides from the destination's provider.
  bool path_style = 7;
}

// The database descriptor for a DATABASE backup/restore. The control plane
// resolves the container name + engine details from its store; the agent stays
// dumb about Deplo's DB model and just runs the right tool inside the container.
message DatabaseDescriptor {
  // The DB container to `docker exec` into (the agent re-derives nothing — it
  // execs exactly this name). For a Deplo DB this is the compose container of
  // the db-<name> stack.
  string container = 1;
  // The engine, lower-case: "postgres" | "mysql" | "mariadb" | "mongodb" |
  // "redis" | "clickhouse". Selects the dump/restore tool + flags.
  string db_type = 2;
  // The logical database name to dump/restore (the default DB for the engine).
  string db_name = 3;
  // The superuser the dump tool authenticates as inside the container.
  string user = 4;
  // The engine password, decrypted by the control plane. The agent keeps it OFF
  // the host docker-client's argv (which is world-readable via ps/proc) wherever
  // the engine's tool can read it from an env var instead: postgres PGPASSWORD,
  // mysql/mariadb MYSQL_PWD, redis REDISCLI_AUTH — forwarded into the container
  // via a valueless `docker exec -e NAME`, so the value rides only in the host
  // process's env. mongodump/mongorestore have no password env var, so for mongo
  // the password is still passed as `-p <pw>` on argv (a bounded, host-local
  // residual; the agent masks it out of any error string it logs). Empty when the
  // container trusts local socket auth.
  string password = 5;
}

// The project descriptor for a PROJECT backup/restore. The control plane resolves
// the persistent state's three shapes into a flat name list (host bind mounts
// excluded) so the agent stays dumb about Deplo's volume-naming scheme.
message ProjectDescriptor {
  // The project slug — keys the files dir (<stack-dir>/files/<slug>) and the
  // stack the restore re-Reroutes.
  string slug = 1;
  // The host volume names to tar: the named-volume shape (hostVolumeName =
  // deplo-<slug>-<name>) AND the compose-stack volumes the control plane parsed
  // out of the rendered YAML. Host bind mounts are NOT here (excluded). A helper
  // container mounts each read-only to tar it.
  repeated string volume_names = 2;
  // Whether to include the project files dir (<stack-dir>/files/<slug>) in the
  // archive. False when the project has no files dir.
  bool include_files = 3;
  // The rendered compose YAML snapshot, captured into the archive so a restore
  // can re-Reroute the EXACT config that was backed up (full data + config
  // restore). Opaque to the agent.
  string compose_yaml = 4;
  // The decrypted env snapshot for the re-Reroute on restore. Stored in the
  // archive; the env secrets are written 0600 like every other env-file. Empty
  // for single-image projects that bake env into the compose.
  map<string, string> env_snapshot = 5;
  // Compose mount files (template config) to re-materialise on restore, mirroring
  // RerouteRequest.mounts. Empty for single-image projects.
  repeated MountFile mounts = 6;
}

message BackupRequest {
  BackupKind kind = 1;
  S3Target s3 = 2;
  // Exactly one of these is set, per `kind`.
  DatabaseDescriptor database = 3;
  ProjectDescriptor project = 4;
}

// One event in the backup stream. Exactly one arm is set; the terminal arm is
// always `result`. Mirrors the Deploy stream's log/result shape so the control
// plane reuses the same SSE plumbing.
message BackupEvent {
  oneof event {
    LogLine log = 1;
    BackupResult result = 2;
  }
}

message BackupResult {
  // True => the dump+upload completed and the object is in the bucket.
  bool ok = 1;
  // A human-readable reason on failure (empty on success).
  string error = 2;
  // The object key written (echoes S3Target.object_key on success) and its size
  // in bytes — recorded on the control plane's BackupRun.
  string object_key = 3;
  int64 size_bytes = 4;
}

message RestoreRequest {
  BackupKind kind = 1;
  S3Target s3 = 2; // object_key points at the artifact to restore FROM
  DatabaseDescriptor database = 3;
  ProjectDescriptor project = 4;
}

message RestoreEvent {
  oneof event {
    LogLine log = 1;
    RestoreResult result = 2;
  }
}

message RestoreResult {
  bool ok = 1;
  string error = 2;
}

message S3CheckRequest {
  // Bucket coordinates + creds; object_key is ignored (this is a bucket probe).
  S3Target s3 = 1;
}

message S3CheckResponse {
  // True when the bucket is reachable AND writable with these creds.
  bool ok = 1;
  // "" on success; a human-readable reason otherwise (bad creds, no bucket,
  // network) — surfaced as the destination's status detail.
  string error = 2;
}

message S3DeleteRequest {
  // s3.object_key is the key (or, with `prefix`, the prefix) to remove.
  S3Target s3 = 1;
  // When true, delete EVERY object under s3.object_key as a prefix (retention /
  // delete-with-artifacts of a whole target's folder). When false, delete the
  // single exact key. Defaults to a single-key delete.
  bool prefix = 2;
}

message S3DeleteResponse {
  bool ok = 1;
  string error = 2;
  // How many objects were deleted (0 when already absent — still ok, idempotent).
  int64 deleted = 3;
}

// ---------------------------------------------------------------------------
// PART C — console observability (logs / attach / exec / instances)
// ---------------------------------------------------------------------------

// Every container RPC carries BOTH the project id and the already-resolved
// container NAME. The control plane is the primary authz gate (it resolves the
// instance from its own store before calling), but the agent ALSO label-checks
// `deplo.project=<project_id>` on the named container before acting — defence in
// depth, so a container name off the wire can never reach a sibling project's
// container even if the control-plane check were ever bypassed.

message FollowLogsRequest {
  // The project the container must belong to (agent re-validates the label).
  string project_id = 1;
  // The exact container name to stream (resolved control-plane-side from the
  // project's instances; the agent confirms it carries project_id's label).
  string container = 2;
  // Seed the stream with the last N lines before following live. 0 => 500.
  int32 tail = 3;
}

// One raw chunk of merged stdout+stderr. Bytes, not lines: a multi-byte UTF-8
// glyph or ANSI sequence split across reads is reassembled by the control
// plane's StringDecoder, exactly as the local `docker logs` pipe path does.
message LogChunk {
  bytes data = 1;
}

// A client->agent frame on the Attach stream. The first frame MUST be `open`.
message AttachInput {
  oneof frame {
    AttachOpen open = 1;     // FIRST message: selects the container + tty + size
    bytes data = 2;          // stdin keystrokes (raw bytes)
    AttachResize resize = 3; // terminal resize (tty containers only)
  }
}

message AttachOpen {
  string project_id = 1;     // agent re-validates the container's label
  string container = 2;
  // True for a tty:true container (a real pseudo-terminal is allocated, Go
  // creack/pty); false attaches over plain pipes. Resolved control-plane-side
  // from inspectStdio and passed in.
  bool tty = 3;
  int32 cols = 4;            // initial terminal size (tty only); 0 => 80
  int32 rows = 5;            // 0 => 24
}

message AttachResize {
  int32 cols = 1;
  int32 rows = 2;
}

// An agent->client frame on the Attach stream.
message AttachOutput {
  oneof frame {
    bytes data = 1;          // merged container output
    AttachExit exit = 2;     // the attach client exited (container stop/detach)
  }
}

message AttachExit {
  int32 code = 1;
}

message ListInstancesRequest {
  string project_id = 1;     // label filter: deplo.project=<project_id>
  string slug = 2;           // for the single-image synthetic service name
  // The Traefik-exposed service name (project.expose.service), so the agent can
  // flag the exposed instance for ordering. Empty => none exposed.
  string expose_service = 3;
}

// Mirrors lib/data/console.ts ConsoleInstance exactly (field-for-field) so the
// control plane maps it 1:1 without translation.
message ConsoleInstance {
  string name = 1;
  string service = 2;
  string image = 3;
  bool running = 4;
  bool exposed = 5;
  string user = 6;
  string workdir = 7;
  bool open_stdin = 8;
  bool tty = 9;

  // Fields 10-12 are ADDITIVE (contract stays V1): an older agent simply omits
  // them and the control plane falls back to `running`. They exist because
  // `running` alone cannot tell a container docker is CRASH-LOOPING from one
  // that is cleanly stopped — both are "not running" — which is how an app in a
  // restart loop was reported as Online.

  // Raw docker state: "running" | "restarting" | "exited" | "created" |
  // "paused" | "dead" | "removing". Empty from an agent too old to send it.
  string state = 10;
  // Healthcheck verdict when the image defines one: "healthy" | "unhealthy" |
  // "starting". Empty when the container has no healthcheck (the common case) —
  // NOT a synonym for healthy.
  string health = 11;
  // How many times docker has restarted this container. The number that turns
  // "it is starting" into "it has been dying for an hour".
  int32 restart_count = 12;
}

message ListInstancesResponse {
  // Exposed/running first (the agent applies the same sort as listInstances).
  // Empty when the project has no containers — NO synthetic fallback entry (a
  // fabricated container would be the "stored status that lies"; the localhost-
  // only synthetic entry stays control-plane-side).
  repeated ConsoleInstance instances = 1;
}

message ExecRequest {
  string project_id = 1;
  string container = 2;
  string command = 3;        // the raw command line (shell-interpreted or argv)
  string image = 4;          // for the shell-plan cache key
}

message ExecResponse {
  int32 code = 1;            // guest exit code (a non-zero exit is NOT an error)
  string stdout = 2;
  string stderr = 3;
  // True when the image had no shell and the command ran as raw argv (no pipes/
  // globbing) — the console renders a notice.
  bool raw_mode = 4;
}

message ShellLabelRequest {
  string project_id = 1;
  string container = 2;
  string image = 3;
}

message ShellLabelResponse {
  string label = 1;          // "/bin/sh" | "/bin/bash" | "raw exec (no shell)"
}

// ---------------------------------------------------------------------------
// PART C — project config files
// ---------------------------------------------------------------------------

// File RPCs key on SLUG, not project_id: the on-disk root is
// <stack-dir>/files/<slug> (the agent derives the root itself from its
// --stack-dir; it never takes a root path off the wire). The relative `path` is
// re-validated against that root inside the agent via internal/safepath (lexical
// `..` reject + realpath containment), since the path arrives off the wire.

// Mirrors lib/data/project-files.ts FileEntry.
message FileEntry {
  string path = 1;           // relative to the files root, POSIX, no leading /
  string name = 2;
  string kind = 3;           // "dir" | "file"
  int64 size = 4;
  string modified_at = 5;    // ISO timestamp
}

// The common return for the mutating file ops (write/upload/mkdir/rename).
message FileEntryResult {
  FileEntry entry = 1;
}

message ListFilesRequest {
  string slug = 1;
  string path = 2;           // "" => the root
}

message ListFilesResponse {
  repeated FileEntry entries = 1;  // dirs first, then files, each alphabetical
}

message ReadFileRequest {
  string slug = 1;
  string path = 2;
}

message ReadFileResponse {
  string path = 1;
  // The UTF-8 text body. Empty when reason != "" (binary/too-large).
  string text = 2;
  int64 size = 3;
  // "" when text is present; "binary" or "too-large" when it is withheld —
  // matches lib/data/project-files.ts FileContent.reason byte-for-byte.
  string reason = 4;
}

message WriteFileRequest {
  string slug = 1;
  string path = 2;
  string content = 3;        // capped at 1 MiB agent-side
}

message UploadFileRequest {
  string slug = 1;
  string path = 2;
  // Raw bytes (the GraphQL layer base64-decodes; the wire carries binary).
  bytes data = 3;
}

message CreateDirRequest {
  string slug = 1;
  string path = 2;
}

message DeleteFileRequest {
  string slug = 1;
  string path = 2;
}

message DeleteFileResult {
  bool ok = 1;
}

message RenameFileRequest {
  string slug = 1;
  string path = 2;
  string new_path = 3;
}

message FilesExistRequest {
  string slug = 1;
}

message FilesExistResponse {
  bool exists = 1;
}

// ---------------------------------------------------------------------------
// PART D — dev containers + SSH gateway per server
// ---------------------------------------------------------------------------

// Everything the agent needs to start a project's dev container, all rendered by
// the control plane (D2: one renderer, opaque artifacts on the wire). The agent
// neither resolves the image nor renders labels — it writes files and runs Docker.
message StartDevRequest {
  // Project identity. `slug` keys the dev compose project / container name
  // (deplo-dev-<slug>), the stack file, the workspace dir, and the deps volume;
  // `project_id` goes into the deplo.* labels (already baked into compose_yaml).
  string slug = 1;
  string project_id = 2;

  // The fully-rendered dev compose YAML (renderDevCompose) — opaque to the agent,
  // written to <stack-dir>/dev-<slug>.yml (0600: it holds decrypted `development`
  // env). The bind sources inside already point at the agent's <dev-dir>/<slug>,
  // the entry script, and the clone-secret path (the agent uses the SAME data dir
  // layout as the control plane did, so the host paths line up).
  string compose_yaml = 3;

  // The dev entrypoint script (DEV_ENTRY_SCRIPT) the compose bind-mounts. Written
  // 0755 to <dev-dir>/_entry/deplo-dev-entry, idempotently (rewritten each start
  // so a Deplo upgrade ships a new entrypoint without a rebuild). Rendered by the
  // control plane so the agent stays dumb about its contents.
  string entry_script = 4;

  // Source seeding (mirrors lib/deploy/dev.ts). Exactly one applies:
  //  - GIT: the control plane minted a tokenized clone URL; the agent stages it
  //    to a root-owned 0600 file the compose bind-mounts at /run/deplo/clone-url
  //    (never env / inspect-able). Empty => not a git source (clear any stale one).
  //  - UPLOAD: the archive is streamed in `upload_tar` and the agent extracts it
  //    into the (empty) workspace host-side before the container starts (the
  //    archive isn't mounted in the container). Empty => nothing to seed.
  string clone_secret_url = 5;
  bytes upload_tar = 6;

  // The `-v <host>:/workspace` source for the pre-chown helper container, already
  // host-path-translated by the control plane (its container's data mount differs
  // from the in-container /data path; renderDevCompose does the same translation
  // for the compose binds). For a bare-host remote agent this equals the plain
  // workspace path (no translation), since the agent's own /data IS the host
  // path. Empty => the agent pre-chowns its plain <dev-dir>/<slug>.
  string workspace_host_path = 7;
}

message StopDevRequest {
  string slug = 1;
}

message TeardownDevRequest {
  string slug = 1;
}

// The rendered SSH-gateway config files + the user projection. The control plane
// keeps gateway-config.ts / gateway-projection.ts as the single source of truth
// (snapshot-tested) and ships the rendered strings here; the agent writes them to
// <data-dir>/ssh-gateway/ and brings the 2-service stack up. The agent never
// re-implements the security-critical wrapper / sshd_config / allowlist in Go.
message GatewayConfig {
  // The rendered docker-compose for the 2-service gateway (proxy + gateway),
  // already host-path-translated by the control plane (renderGatewayCompose) so
  // the bind mount works whatever the agent's data layout is. NOTE: the control
  // plane translates against ITS OWN data mount; for a remote agent the agent's
  // own GW dir is used (the agent owns the path), so the agent re-renders the
  // compose's bind path locally — see the agent impl. Carried for localhost parity.
  string compose_yaml = 1;
  string sshd_config = 2;        // -> ssh-gateway/sshd_config
  string wrapper_script = 3;     // -> ssh-gateway/deplo-dev-shell (0755)
  string entrypoint_script = 4;  // -> ssh-gateway/gateway-entrypoint (0755)
  string socket_filter_cfg = 5;  // -> ssh-gateway/socket-filter.cfg
}

// One control-plane-computed gateway exec step the agent runs verbatim inside the
// gateway container: `docker exec -i <gateway> <argv...>`, optionally piping
// `input` to the command's stdin (chpasswd / file writes — the secret never hits
// argv/env that `docker inspect` could surface). Mirrors GatewayStep in
// lib/infra/gateway-projection.ts; the control plane decrypts the password
// just-in-time and bakes the cleartext into the right step's `input`.
message GatewayStep {
  repeated string argv = 1;
  string input = 2;
}

// Ensure the gateway is up, then reconcile EVERY supplied user into it (the
// store is the sole source of truth — ADR-0002; the control plane sends the full
// provision plan for every DevSshUser of this server so a fresh gateway rebuilds
// its whole projection).
message EnsureGatewayRequest {
  GatewayConfig config = 1;
  // The provision steps for every stored user of this server, in order. Each
  // inner step-list provisions one account/key/map. Replayed on first boot and
  // after drift — provisioning is idempotent.
  repeated UserSteps users = 2;
}

// The ordered provision (or deprovision) steps for ONE user.
message UserSteps {
  repeated GatewayStep steps = 1;
}

message ProvisionSshUserRequest {
  // Ensure the gateway first (a user can be the first SSH user → lazy create).
  GatewayConfig config = 1;
  // The full user reconcile set (every stored user) so a just-created gateway is
  // rebuilt from the store, exactly like EnsureGateway. The agent provisions all.
  repeated UserSteps users = 2;
}

message DeprovisionSshUserRequest {
  // The deprovision steps for the one user being removed (pkill / deluser / rm).
  repeated GatewayStep steps = 1;
}

// ---- VS Code tunnel ----

message TunnelRequest {
  string slug = 1;
  // The launch script (tunnelLaunchScript) — only set on StartTunnel; rendered by
  // the control plane so the CLI download URL / tunnel name stay one source.
  string launch_script = 2;
}

// The agent returns the RAW tunnel log + running flag; the control plane parses
// it (parseTunnelLog) into the device-login link / connected URL — that logic
// stays pure and testable in TS, not duplicated in Go.
message TunnelStatus {
  bool running = 1;
  string log = 2;
}

// ---- Docker cleanup ----

// Which classes of object a cleanup may reclaim. Every scope is an ALLOW-LIST —
// see the DockerCleanup RPC contract. Scopes not listed here DO NOT EXIST:
// container prune, volume prune, network prune and `system prune` are
// deliberately absent and must never be added, because a stopped Deplo app is a
// live app (its container, volumes and networks must survive a `compose stop`)
// and a dangling volume may hold a database's data files. Adding one would turn
// a disk-reclaim button into a data-loss button.
enum CleanupScope {
  CLEANUP_SCOPE_UNSPECIFIED = 0;
  // `docker builder prune` — the daemon's own BuildKit cache. Touches no Deplo
  // object at all.
  CLEANUP_SCOPE_BUILD_CACHE = 1;
  // `docker image prune` — untagged layers only, NEVER `-a`. A stopped container
  // still pins its image, so this cannot strand an app.
  CLEANUP_SCOPE_DANGLING_IMAGES = 2;
  // Dangling anonymous volumes that are PROVABLY buildkitd stores: the railpack
  // builder runs `moby/buildkit`, which declares VOLUME /var/lib/buildkit, and an
  // orphaned one is identified by the `buildkitd.lock` sentinel file at its
  // mountpoint — never by name, never by label. Removed one `docker volume rm` at
  // a time.
  CLEANUP_SCOPE_ORPHAN_BUILDKIT_CACHE = 3;
  // Old `deplo/<slug>:<deployment>` images labelled deplo.managed=true that NO
  // container (running or exited) references, older than min_age_hours, minus the
  // newest keep_images_per_app per deplo.slug. Removed BY ID with an explicit
  // `docker rmi` each — never `image prune -a`, which would decide for us. There
  // is no registry push anywhere in Deplo, so a removed image is recoverable only
  // by a rebuild: this scope is opt-in and off by default.
  CLEANUP_SCOPE_UNUSED_APP_IMAGES = 4;
}

message DockerCleanupRequest {
  // The scopes to reclaim. Empty => nothing is done (ok, zero results): the
  // control plane, not the agent, owns the default set.
  repeated CleanupScope scopes = 1;
  // When true the agent ENUMERATES candidates and removes NOTHING; every
  // CleanupScopeResult is populated as if the removal had happened. This is what
  // the UI calls to render its confirm dialog.
  bool dry_run = 2;
  // Only reclaim objects older than this. 0 => no age filter. Maps to docker's
  // `--filter until=<n>h` on the prune scopes, and to a created-at comparison on
  // the enumerated ones. An object whose age the agent cannot determine is never
  // a candidate while an age filter is set (fail closed).
  int32 min_age_hours = 3;
  // UNUSED_APP_IMAGES only: how many of the newest images to keep per deplo.slug.
  // 0 => 1 — the current tag is always kept, even when no container references it
  // (a stopped app must stay redeployable without a rebuild).
  int32 keep_images_per_app = 4;
}

message CleanupScopeResult {
  CleanupScope scope = 1;
  // Bytes reclaimed by this scope. Where docker reports its own total after a
  // prune that total is authoritative; otherwise it is the summed size of the
  // objects actually removed (which is also what a dry_run reports, since nothing
  // has been removed yet to measure). Never an invented number.
  int64 reclaimed_bytes = 2;
  int32 items_removed = 3;
  // The image ids / volume names / cache-record ids removed — or, under dry_run,
  // that WOULD be removed. Bounded to 200 entries; items_removed is authoritative.
  repeated string items = 4;
  // True when the agent DECLINED the scope: it could not build the
  // container-reference reverse index the scope's safety rests on, so it refused
  // to guess. A skipped scope is not a failure — the sweep continues.
  bool skipped = 5;
  // Per-scope failure. Non-fatal: the other scopes still run and the response is
  // still ok.
  string error = 6;
}

message DockerCleanupResponse {
  // False only when the whole sweep could not start.
  bool ok = 1;
  string error = 2;
  // The sum of the per-scope reclaimed_bytes.
  int64 reclaimed_bytes = 3;
  repeated CleanupScopeResult results = 4;
}

// ---------------------------------------------------------------------------
// ContainerStats — per-container `docker stats` for the Monitoring tab
// ---------------------------------------------------------------------------
//
// Messages for the ContainerStats RPC (declared up in the service block next to
// Metrics). Kept at the END of the file so appending them doesn't renumber the
// generated message indices of everything below their logical home — the wire
// is identical either way, but the committed *.pb.go / agent.ts diff stays a
// clean, purely-additive one.

message ContainerStatsRequest {
  // The project the containers must belong to (agent re-validates the label
  // deplo.project=<project_id>). Empty is REJECTED — a blank filter would stat
  // every container on the host (cross-tenant), exactly like ListInstances.
  string project_id = 1;
  // The container names to stat (resolved control-plane-side from the project's
  // instances). Any name that does not carry project_id's label is dropped.
  // Empty => stat all of the project's containers.
  repeated string containers = 2;
}

// One container's live resource usage, parsed from `docker stats --no-stream`.
// net_* / block_* are CUMULATIVE totals since container start (that is what
// `docker stats` reports), NOT rates — the control plane derives bytes/sec from
// the delta between consecutive samples, which also survives a counter reset on
// restart. cpu_pct and mem_* are already instantaneous.
message ContainerStat {
  string name = 1;
  double cpu_pct = 2;      // 0-100 (across all cores, like `docker stats`)
  int64 mem_used = 3;      // bytes
  int64 mem_limit = 4;     // bytes
  double mem_pct = 5;
  int64 net_rx = 6;        // cumulative bytes received
  int64 net_tx = 7;        // cumulative bytes transmitted
  int64 block_read = 8;    // cumulative bytes read from block devices
  int64 block_write = 9;   // cumulative bytes written
  int32 pids = 10;
  // False for a container that exists in the project but is not running (stats
  // are zeroed) — so the tab can distinguish "stopped" from "no such container".
  bool running = 11;

  // Fields 12-16 are ADDITIVE (contract stays V1). The per-project
  // ContainerStats RPC leaves 12-13 empty because its caller already knows the
  // project and asked by name; they exist for the HOST-WIDE StreamMetrics frame,
  // which carries every project's containers at once and must be demuxable.

  // The deplo.project label (an App id, prj_*, or a Database id) this container
  // belongs to — the demux key for the host-wide stream. Identity comes from the
  // LABEL, never from parsing the container name: name-mangling is how Dokploy
  // collapses every sibling Compose container of an App into one series.
  string project_id = 12;
  // The full 64-hex Docker id. Stable for a container's lifetime and CHANGES on
  // recreation, which is exactly what the rate calculator needs in order to drop
  // a stale previous sample instead of emitting a bogus negative delta.
  string container_id = 13;

  // Fields 14-16 mirror ConsoleInstance's state/health/restart_count field-for-
  // field so the control plane maps them with no translation. They ride the
  // metrics frame because the sampler already visits every container each tick,
  // which lets live status stop polling ListInstances per App. `running` alone
  // cannot tell a container docker is CRASH-LOOPING from one cleanly stopped —
  // both are "not running" — which is how an app in a restart loop got reported
  // as Online.

  // Raw docker state: "running" | "restarting" | "exited" | "created" |
  // "paused" | "dead" | "removing". Empty from an agent too old to send it.
  string state = 14;
  // Healthcheck verdict when the image defines one: "healthy" | "unhealthy" |
  // "starting". Empty when the container has no healthcheck (the common case) —
  // NOT a synonym for healthy.
  string health = 15;
  // How many times docker has restarted this container. The number that turns
  // "it is starting" into "it has been dying for an hour".
  int32 restart_count = 16;
}

message ContainerStatsResponse {
  repeated ContainerStat stats = 1;
}

// ---------------------------------------------------------------------------
// StreamMetrics — one long-lived telemetry stream per host
// ---------------------------------------------------------------------------
//
// Appended at the END of the file for the same reason ContainerStats was: the
// wire is identical wherever they sit, but keeping additions last leaves the
// committed *.pb.go / agent.ts diff purely additive.

message MetricsStreamRequest {
  // The path whose filesystem to measure for disk usage (the agent's data dir).
  // Empty => the agent's own --data-dir, exactly like MetricsRequest.
  string data_dir = 1;
  // Sampling cadence. 0 => the agent's default (5000). The agent CLAMPS this to
  // [1000, 60000]: a cadence is a HINT, never a way for a caller to pin the host
  // by asking for 10ms samples.
  int32 interval_ms = 2;
  // False => host metrics only. No container roster, no `docker ps`, no stats —
  // for a caller that only wants the host gauge.
  bool include_containers = 3;
}

// One tick. `host` is always present; `containers` is empty unless the request
// asked for them (or nothing Deplo-managed is running on this host).
message MetricsSample {
  HostMetrics host = 1;
  repeated ContainerStat containers = 2;
  // The AGENT's clock at sample time. The control plane stamps its OWN receive
  // time into the ring buffer — clock skew between hosts must never move a point
  // on a chart — but this makes agent-side sampling gaps diagnosable after the
  // fact, which a receive timestamp alone cannot do.
  int64 sampled_at_unix_ms = 3;
  // Which backend produced this frame: "cgroup2" | "docker-stats". Diagnostic
  // only — the numbers mean the same thing either way. It lets the control plane
  // surface "this host is on the slow path" (~18x the CPU cost) without a second
  // RPC, and makes an automatic demotion visible instead of silent.
  string source = 4;
}
